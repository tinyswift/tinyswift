name: TinySwift CI
on:
  push: { branches: [main, release/*] }
  pull_request: { branches: [main] }
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  LLVM_VERSION: "17.0.6"

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install cmake ninja python3 sccache
      - name: Install LLVM
        run: |
          curl -L "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-arm64-apple-darwin22.0.tar.xz" -o llvm.tar.xz
          mkdir -p ${{ runner.temp }}/llvm
          tar xf llvm.tar.xz -C ${{ runner.temp }}/llvm --strip-components=1
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/tinyswift-debug
          key: macos-${{ hashFiles('CMakeLists.txt', 'lib/**/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: macos-
      - name: Configure & Build
        run: |
          cmake --preset tinyswift-debug \
            -DCMAKE_C_COMPILER=${{ runner.temp }}/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=${{ runner.temp }}/llvm/bin/clang++ \
            -DLLVM_DIR=${{ runner.temp }}/llvm/lib/cmake/llvm \
            -DClang_DIR=${{ runner.temp }}/llvm/lib/cmake/clang \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build --preset tinyswift-debug
      - name: Run TinySwift smoke tests
        run: |
          FAIL=0
          for f in test/TinySwift/smoke/*.swift; do
            echo "=== Smoke: $f ==="
            if build/tinyswift-debug/bin/swift-frontend -typecheck \
              -enable-experimental-feature Embedded -parse-stdlib "$f"; then
              echo "PASS"
            else
              echo "FAIL"
              FAIL=1
            fi
          done
          exit $FAIL
      - name: Forbidden symbol check
        run: ./scripts/check-forbidden-symbols.sh build/tinyswift-debug/bin/swift-frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: tinyswiftc-macos, path: "build/tinyswift-debug/bin/", retention-days: 7 }

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build python3 \
            libncurses5-dev libedit-dev libxml2-dev
      - name: Install LLVM
        run: |
          wget -qO- "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            | tar xJ -C ${{ runner.temp }}
          mv ${{ runner.temp }}/clang+llvm-* ${{ runner.temp }}/llvm
      - name: Configure & Build
        run: |
          cmake --preset tinyswift-debug \
            -DCMAKE_C_COMPILER=${{ runner.temp }}/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=${{ runner.temp }}/llvm/bin/clang++ \
            -DLLVM_DIR=${{ runner.temp }}/llvm/lib/cmake/llvm \
            -DClang_DIR=${{ runner.temp }}/llvm/lib/cmake/clang
          cmake --build --preset tinyswift-debug
      - name: Run TinySwift smoke tests
        run: |
          FAIL=0
          for f in test/TinySwift/smoke/*.swift; do
            echo "=== Smoke: $f ==="
            if build/tinyswift-debug/bin/swift-frontend -typecheck \
              -enable-experimental-feature Embedded -parse-stdlib "$f"; then
              echo "PASS"
            else
              echo "FAIL"
              FAIL=1
            fi
          done
          exit $FAIL
      - name: Forbidden symbol check
        run: ./scripts/check-forbidden-symbols.sh build/tinyswift-debug/bin/swift-frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: tinyswiftc-linux, path: "build/tinyswift-debug/bin/", retention-days: 7 }

  embedded-arm64:
    name: Embedded ARM64 (QEMU)
    needs: [build-linux]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU + tools
        run: |
          sudo apt-get update && sudo apt-get install -y \
            qemu-system-arm lld expect
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: tinyswiftc-linux
          path: build/bin
      - name: Make binaries executable
        run: chmod +x build/bin/*
      - name: Install LLVM (for clang cross-compile)
        run: |
          wget -qO- "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            | tar xJ -C ${{ runner.temp }}
          mv ${{ runner.temp }}/clang+llvm-* ${{ runner.temp }}/llvm
      - name: Compile ARM64 UART demo
        run: |
          SUPPORT_DIR=utils/embedded-test-support/aarch64-qemu-virt
          TARGET=aarch64-none-elf
          CLANG=${{ runner.temp }}/llvm/bin/clang
          LLD=${{ runner.temp }}/llvm/bin/ld.lld

          # Compile support.c
          $CLANG -target $TARGET -ffreestanding -nostdlib -O2 -c \
            $SUPPORT_DIR/support.c -o /tmp/support.o

          # Compile Swift UART demo to object
          build/bin/swift-frontend -emit-object -target $TARGET \
            -enable-experimental-feature Embedded \
            -enable-experimental-feature TinySwift \
            -disable-objc-interop -parse-stdlib -parse-as-library -Osize \
            -module-name hello \
            test/TinySwift/embedded/hello_uart_arm64.swift -o /tmp/hello.o

          # Link
          $LLD -T $SUPPORT_DIR/linkerscript.ld \
            -e start --gc-sections \
            /tmp/support.o /tmp/hello.o -o /tmp/hello.elf
      - name: Forbidden symbol check
        run: |
          SYMS=$(nm /tmp/hello.o 2>/dev/null | grep -cE 'swift_retain|swift_release' || true)
          echo "ARC symbols found: $SYMS"
          test "$SYMS" -eq 0
      - name: Run on QEMU AArch64
        run: |
          timeout 10 qemu-system-aarch64 -M virt -cpu cortex-a53 -nographic \
            -bios none -kernel /tmp/hello.elf 2>&1 | tee /tmp/qemu-output.txt || true
          grep -q "Hello, TinySwift!" /tmp/qemu-output.txt

  embedded-riscv32:
    name: Embedded RISC-V 32 (QEMU)
    needs: [build-linux]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU + tools
        run: |
          sudo apt-get update && sudo apt-get install -y \
            qemu-system-misc lld expect
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: tinyswiftc-linux
          path: build/bin
      - name: Make binaries executable
        run: chmod +x build/bin/*
      - name: Install LLVM (for clang cross-compile)
        run: |
          wget -qO- "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            | tar xJ -C ${{ runner.temp }}
          mv ${{ runner.temp }}/clang+llvm-* ${{ runner.temp }}/llvm
      - name: Compile RISC-V UART demo
        run: |
          SUPPORT_DIR=utils/embedded-test-support/riscv32-qemu-virt
          TARGET=riscv32-none-none-eabi
          CLANG=${{ runner.temp }}/llvm/bin/clang
          LLD=${{ runner.temp }}/llvm/bin/ld.lld

          # Compile support.c
          $CLANG -target $TARGET -ffreestanding -nostdlib -O2 -c \
            $SUPPORT_DIR/support.c -o /tmp/support.o

          # Compile Swift UART demo to object
          build/bin/swift-frontend -emit-object -target $TARGET \
            -enable-experimental-feature Embedded \
            -enable-experimental-feature TinySwift \
            -disable-objc-interop -parse-stdlib -parse-as-library -Osize \
            -module-name hello \
            test/TinySwift/embedded/hello_uart_riscv32.swift -o /tmp/hello.o

          # Link
          $LLD -T $SUPPORT_DIR/linkerscript.ld \
            -e start --gc-sections \
            /tmp/support.o /tmp/hello.o -o /tmp/hello.elf
      - name: Forbidden symbol check
        run: |
          SYMS=$(nm /tmp/hello.o 2>/dev/null | grep -cE 'swift_retain|swift_release' || true)
          echo "ARC symbols found: $SYMS"
          test "$SYMS" -eq 0
      - name: Run on QEMU RISC-V
        run: |
          timeout 10 qemu-system-riscv32 -M virt -nographic \
            -bios none -kernel /tmp/hello.elf 2>&1 | tee /tmp/qemu-output.txt || true
          grep -q "Hello, TinySwift!" /tmp/qemu-output.txt

  embedded-wasm:
    name: Embedded WebAssembly (WASI)
    needs: [build-linux]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - name: Install LLVM (for wasm-ld)
        run: |
          wget -qO- "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            | tar xJ -C ${{ runner.temp }}
          mv ${{ runner.temp }}/clang+llvm-* ${{ runner.temp }}/llvm
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: tinyswiftc-linux
          path: build/bin
      - name: Make binaries executable
        run: chmod +x build/bin/*
      - name: Compile Wasm demo
        run: |
          SUPPORT_DIR=utils/embedded-test-support/wasm32-wasi
          TARGET=wasm32-unknown-wasi
          CLANG=${{ runner.temp }}/llvm/bin/clang
          WASM_LD=${{ runner.temp }}/llvm/bin/wasm-ld

          # Compile support.c for WASI
          $CLANG --target=$TARGET -ffreestanding -nostdlib -O2 -c \
            $SUPPORT_DIR/support.c -o /tmp/support.o

          # Compile Swift Wasm demo to object
          build/bin/swift-frontend -emit-object -target $TARGET \
            -enable-experimental-feature Embedded \
            -enable-experimental-feature TinySwift \
            -disable-objc-interop -parse-stdlib -parse-as-library -Osize \
            -module-name hello \
            test/TinySwift/embedded/hello_wasm.swift -o /tmp/hello.o

          # Link with wasm-ld
          $WASM_LD --no-entry --export-all --allow-undefined \
            --initial-memory=65536 --stack-first \
            /tmp/support.o /tmp/hello.o -o /tmp/hello.wasm
      - name: Forbidden symbol check
        run: |
          SYMS=$(wasm-objdump -x /tmp/hello.wasm 2>/dev/null | grep -cE 'swift_retain|swift_release' || true)
          echo "ARC symbols found: $SYMS"
          test "$SYMS" -eq 0
      - name: Run with wasmtime
        run: |
          wasmtime /tmp/hello.wasm 2>&1 | tee /tmp/wasm-output.txt || true
          grep -q "Hello, TinySwift!" /tmp/wasm-output.txt

  binary-size:
    name: Binary Size Report
    needs: [build-linux]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: tinyswiftc-linux
          path: build/bin
      - name: Make binaries executable
        run: chmod +x build/bin/*
      - name: Install LLVM
        run: |
          wget -qO- "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            | tar xJ -C ${{ runner.temp }}
          mv ${{ runner.temp }}/clang+llvm-* ${{ runner.temp }}/llvm
      - name: Run binary size report
        run: |
          export SWIFT_FRONTEND=build/bin/swift-frontend
          export LLVM_SIZE=${{ runner.temp }}/llvm/bin/llvm-size
          export BUILD_DIR=build
          ./scripts/binary-size-report.sh | tee $GITHUB_STEP_SUMMARY
