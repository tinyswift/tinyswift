name: TinySwift Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  LLVM_VERSION: "17.0.6"

jobs:
  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja python3

      - name: Install LLVM
        run: |
          curl -L "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-arm64-apple-darwin22.0.tar.xz" -o llvm.tar.xz
          mkdir -p ${{ runner.temp }}/llvm
          tar xf llvm.tar.xz -C ${{ runner.temp }}/llvm --strip-components=1

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure & Build
        run: |
          cmake --preset tinyswift-release \
            -DCMAKE_C_COMPILER=${{ runner.temp }}/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=${{ runner.temp }}/llvm/bin/clang++ \
            -DLLVM_DIR=${{ runner.temp }}/llvm/lib/cmake/llvm \
            -DClang_DIR=${{ runner.temp }}/llvm/lib/cmake/clang
          cmake --build --preset tinyswift-release

      - name: Package toolchain
        run: |
          chmod +x scripts/package-toolchain.sh
          ./scripts/package-toolchain.sh "${{ steps.version.outputs.VERSION }}" macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyswift-${{ steps.version.outputs.VERSION }}-macos-arm64
          path: tinyswift-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.xz
          retention-days: 5

  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build python3 \
            libncurses5-dev libedit-dev libxml2-dev

      - name: Install LLVM
        run: |
          wget -qO- "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            | tar xJ -C ${{ runner.temp }}
          mv ${{ runner.temp }}/clang+llvm-* ${{ runner.temp }}/llvm

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure & Build
        run: |
          cmake --preset tinyswift-release \
            -DCMAKE_C_COMPILER=${{ runner.temp }}/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=${{ runner.temp }}/llvm/bin/clang++ \
            -DLLVM_DIR=${{ runner.temp }}/llvm/lib/cmake/llvm \
            -DClang_DIR=${{ runner.temp }}/llvm/lib/cmake/clang
          cmake --build --preset tinyswift-release

      - name: Package toolchain
        run: |
          chmod +x scripts/package-toolchain.sh
          ./scripts/package-toolchain.sh "${{ steps.version.outputs.VERSION }}" linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyswift-${{ steps.version.outputs.VERSION }}-linux-x86_64
          path: tinyswift-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.xz
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: tinyswift-${{ steps.version.outputs.VERSION }}-macos-arm64
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: tinyswift-${{ steps.version.outputs.VERSION }}-linux-x86_64
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TinySwift ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          files: |
            release-assets/tinyswift-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.xz
            release-assets/tinyswift-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.xz
