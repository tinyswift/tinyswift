name: Bug Report
description: Report a bug in TinySwift
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal Swift code and commands to reproduce the issue.
      placeholder: |
        ```swift
        // minimal.swift
        ```
        ```bash
        swift-frontend -emit-object -target aarch64-none-elf ...
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target Triple
      options:
        - aarch64-none-elf
        - riscv32-none-none-eabi
        - wasm32-unknown-wasi
        - All targets
        - N/A
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TinySwift Version
      placeholder: "v0.1.0-alpha.1 or commit hash"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: "macOS 14.x / Ubuntu 22.04"
    validations:
      required: true
