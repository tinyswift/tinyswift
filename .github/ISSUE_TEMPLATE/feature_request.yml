name: Feature Request
description: Suggest a feature or improvement for TinySwift
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important? What use case does it serve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Compiler (Sema/SIL/IRGen)
        - Standard Library (Builtins.swift)
        - Runtime (Runtime.c)
        - Tooling (tinyswiftc, build system)
        - Documentation
        - CI/Testing
        - New target support
    validations:
      required: true
